name: astrbot_plugin_kfc_crazy_thursday
desc: 疯狂星期四秦始皇马甲回复插件，检测UMO白名单会话中的疯狂星期四话术并自动以秦始皇口吻回复
help: |
  监听消息，当UMO白名单内的会话出现"疯狂星期四""V我50"等关键词时，
  以秦始皇口吻随机回复一条趣味话术，同时拦截LLM响应。
  可选开启API在线文案模式（50%概率从vme.im获取文案）。
  配置项可在WebUI插件设置中修改。
version: v1.2.0
author: Compilerror
repo: https://github.com/CompilError-bts/astrbot_plugin_kfc_crazy_thursday
